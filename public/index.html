<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESPOTADASH</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <h1>ESPOTADASH</h1>
    </div>
    <div class="stats">
      <div><span id="count-online">0</span><small>online</small></div>
      <div><span id="count-offline">0</span><small>offline</small></div>
      <div><span id="count-total">0</span><small>totali</small></div>
      <button id="refresh-btn" class="refresh" title="Forza il ping di tutti i dispositivi">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 21v-5h5"/></svg>
        <span>Aggiorna</span>
      </button>
      <div class="conn" id="conn-status" title="stato connessione">connessione&hellip;</div>
    </div>
  </header>

  <main>
    <div id="empty" class="empty hidden">
      <h2>Nessun dispositivo registrato</h2>
      <p>Accendi un ESP8266 con la libreria <code>ESPOTADASH</code> puntata a questo server.</p>
    </div>
    <section id="grid" class="grid"></section>
  </main>

  <!-- Modal invio comandi -->
  <div id="cmd-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title">Invia comando</h3>
        <button class="modal-close" id="modal-close" aria-label="Chiudi">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-result hidden" id="modal-result"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
